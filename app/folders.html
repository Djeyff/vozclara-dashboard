<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carpetas — VozClara</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/styles.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="two-panel">
    <div class="panel-list" style="width:280px">
      <div class="panel-list-header">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <h2>Carpetas</h2>
          <button class="btn btn-sm btn-primary" onclick="document.getElementById('new-folder').style.display='block'">+ Nueva</button>
        </div>
      </div>
      <div class="panel-list-scroll">
        <div id="new-folder" style="display:none;padding:12px 16px;border-bottom:1px solid var(--border)">
          <input class="form-input" placeholder="Nombre de carpeta" style="margin-bottom:8px;font-size:13px">
          <div style="display:flex;gap:6px">
            <button class="btn btn-sm btn-primary">Crear</button>
            <button class="btn btn-sm btn-secondary" onclick="this.parentNode.parentNode.style.display='none'">Cancelar</button>
          </div>
        </div>
        <div class="list-item" onclick="selectFolder(this)" style="padding:12px 20px">
          <div style="width:10px;height:10px;border-radius:50%;background:#e67e22;flex-shrink:0;margin-top:3px"></div>
          <div class="list-item-content">
            <div class="list-item-title">Clients</div>
            <div style="font-size:12px;color:var(--text-muted)">3 notas</div>
          </div>
        </div>
        <div class="list-item" onclick="selectFolder(this)" style="padding:12px 20px">
          <div style="width:10px;height:10px;border-radius:50%;background:#2a5c8f;flex-shrink:0;margin-top:3px"></div>
          <div class="list-item-content">
            <div class="list-item-title">Legal</div>
            <div style="font-size:12px;color:var(--text-muted)">1 nota</div>
          </div>
        </div>
        <div class="list-item" onclick="selectFolder(this)" style="padding:12px 20px">
          <div style="width:10px;height:10px;border-radius:50%;background:#27ae60;flex-shrink:0;margin-top:3px"></div>
          <div class="list-item-content">
            <div class="list-item-title">Sporting Club</div>
            <div style="font-size:12px;color:var(--text-muted)">2 notas</div>
          </div>
        </div>
      </div>
    </div>
    <div class="panel-detail">
      <div class="panel-detail-empty">
        <div class="empty-icon">📁</div>
        <p>Selecciona una carpeta</p>
      </div>
    </div>
  </div>
</div>
<nav class="mobile-tabs"><div class="mobile-tabs-inner" id="mobile-tabs"></div></nav>
<script src="/app/js/shared.js"></script>
<script>
function init() { renderSidebar('folders'); renderMobileTabs('folders'); }
function selectFolder(el) { document.querySelectorAll('.list-item').forEach(i=>i.classList.remove('selected')); el.classList.add('selected'); }
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
