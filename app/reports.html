<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes PDF — VozClara</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/styles.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="page-content">
      <div class="page-header animate-in">
        <h1 class="page-title">Reportes PDF</h1>
        <button class="btn btn-primary" onclick="alert('Generando reporte...')">+ Generar reporte</button>
      </div>

      <div class="animate-in delay-1">
        <div class="card" style="margin-bottom:10px">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div style="display:flex;align-items:center;gap:12px">
              <div style="width:36px;height:36px;border-radius:8px;background:rgba(231,76,60,0.1);display:flex;align-items:center;justify-content:center;font-size:14px">📄</div>
              <div>
                <div style="font-size:14px;font-weight:600">Resumen semanal — Mar 8–15</div>
                <div style="font-size:12px;color:var(--text-muted)">PDF · 156 KB · 12 notas de voz</div>
              </div>
            </div>
            <button class="btn btn-sm btn-secondary">⬇ Descargar</button>
          </div>
        </div>

        <div class="card" style="margin-bottom:10px">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div style="display:flex;align-items:center;gap:12px">
              <div style="width:36px;height:36px;border-radius:8px;background:rgba(231,76,60,0.1);display:flex;align-items:center;justify-content:center;font-size:14px">📄</div>
              <div>
                <div style="font-size:14px;font-weight:600">Resumen semanal — Mar 1–7</div>
                <div style="font-size:12px;color:var(--text-muted)">PDF · 98 KB · 8 notas de voz</div>
              </div>
            </div>
            <button class="btn btn-sm btn-secondary">⬇ Descargar</button>
          </div>
        </div>
      </div>

      <div class="animate-in delay-2" style="margin-top:32px">
        <div class="card" style="border-color:rgba(230,126,34,0.2);background:var(--accent-glow)">
          <div style="display:flex;align-items:center;gap:14px">
            <span style="font-size:24px">⚡</span>
            <div>
              <div style="font-size:14px;font-weight:600">Reportes automáticos disponibles en Pro</div>
              <div style="font-size:13px;color:var(--text-secondary);margin-top:2px">Genera reportes semanales automáticamente con resúmenes IA, puntos clave y acciones pendientes.</div>
            </div>
            <a href="https://voz-clara.com/#pricing" class="btn btn-sm btn-primary" style="flex-shrink:0">Ver planes</a>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<nav class="mobile-tabs"><div class="mobile-tabs-inner" id="mobile-tabs"></div></nav>
<script src="/app/js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => { renderSidebar('reports'); renderMobileTabs('reports'); });
</script>
</body>
</html>
