<!DOCTYPE html>
<html lang="en" class="bg-gray-950">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VozClara — PDF Reports</title>
  <link rel="icon" href="/public/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
  <style>body{font-family:'Inter',sans-serif}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#030712}::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}</style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex">
  <aside id="sidebar" class="hidden md:flex md:flex-col w-56 bg-gray-900 border-r border-gray-700 h-screen sticky top-0 shrink-0"></aside>

  <main class="flex-1 min-w-0 pb-16 md:pb-0">
    <header class="sticky top-0 z-10 bg-gray-950/80 backdrop-blur border-b border-gray-800 px-4 sm:px-6 py-3">
      <h1 class="text-lg font-semibold">PDF Reports</h1>
    </header>
    <div class="px-4 sm:px-6 py-4" id="content">
      <div class="space-y-3"><div class="h-16 bg-gray-800 rounded-xl animate-pulse"></div></div>
    </div>
  </main>

  <nav id="mobile-tabs" class="md:hidden fixed bottom-0 inset-x-0 bg-gray-900 border-t border-gray-700 grid grid-cols-4 h-14 z-20"></nav>

  <script src="/app/js/shared.js"></script>
  <script>
    renderSidebar('reports');
    renderMobileTabs('reports');

    (async () => {
      try {
        const data = await api('/api/vc/reports');
        if (!data) return;
        render(data.items || []);
      } catch(e) { showError('#content', e.message); }
    })();

    function render(items) {
      const el = $('#content');
      if (!items.length) {
        el.innerHTML = `<div class="flex flex-col items-center justify-center py-16 text-gray-400">
          <span class="text-4xl mb-3">📄</span>
          <p class="font-medium text-white">PDF Reports</p>
          <p class="text-sm mt-1 text-center max-w-sm">Generate professional PDF reports from your voice note transcripts. Available on Pro and Business plans.</p>
          <div class="mt-6 grid gap-3 sm:grid-cols-2 max-w-md">
            <div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
              <p class="text-sm font-medium mb-1">Weekly Summary</p>
              <p class="text-xs text-gray-400">Auto-generated digest of all your voice notes from the past week</p>
            </div>
            <div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
              <p class="text-sm font-medium mb-1">Custom Report</p>
              <p class="text-xs text-gray-400">Select date range, language, and source filters for a tailored report</p>
            </div>
          </div>
          <button onclick="window.open('https://voz-clara.com/#pricing','_blank')" class="mt-4 bg-[#6366f1] hover:bg-[#6366f1]/80 text-white text-sm px-4 py-2 rounded-lg transition-colors">Upgrade to Pro</button>
        </div>`;
        return;
      }
      el.innerHTML = `<div class="space-y-2">${items.map(r =>
        `<div class="bg-gray-900 rounded-xl p-4 border border-gray-800 flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-red-500/20 flex items-center justify-center text-sm">📄</div>
          <div class="flex-1 min-w-0"><p class="text-sm font-medium truncate">${esc(r.name)}</p><p class="text-xs text-gray-500">${formatDate(r.created_at)}</p></div>
          ${r.url ? `<a href="${r.url}" class="text-xs bg-gray-800 hover:bg-gray-700 px-3 py-1.5 rounded-lg transition-colors" download>Download</a>` : ''}
        </div>`
      ).join('')}</div>`;
    }
  </script>
</body>
</html>
