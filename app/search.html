<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Búsqueda IA — VozClara</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/styles.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="page-content" style="max-width:740px;margin:0 auto">
      <div class="page-header animate-in">
        <h1 class="page-title">Búsqueda IA</h1>
        <span style="font-size:12px;color:var(--text-muted)">2 de 5 búsquedas usadas</span>
      </div>
      <div class="search-bar animate-in delay-1" style="margin-bottom:12px">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="q" placeholder="Busca en cualquier idioma — encuentra notas en los 99 idiomas" onkeydown="if(event.key==='Enter')doSearch()">
      </div>
      <p class="animate-in delay-1" style="font-size:12px;color:var(--text-muted);margin-bottom:28px">Busca en cualquier idioma — encuentra notas en los 99 idiomas</p>

      <div id="examples" class="animate-in delay-2">
        <div class="section-title" style="margin-bottom:14px">Prueba preguntando</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          <button class="filter-pill" onclick="document.getElementById('q').value='precio del cemento';doSearch()">precio del cemento</button>
          <button class="filter-pill" onclick="document.getElementById('q').value='delivery dates';doSearch()">delivery dates</button>
          <button class="filter-pill" onclick="document.getElementById('q').value='client meeting';doSearch()">client meeting</button>
          <button class="filter-pill" onclick="document.getElementById('q').value='qué dijo el abogado';doSearch()">qué dijo el abogado</button>
        </div>
      </div>

      <div id="loading" style="display:none;text-align:center;padding:40px">
        <div style="display:inline-flex;align-items:center;gap:10px;color:var(--text-muted);font-size:14px">
          <div style="width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite"></div>
          Buscando en tus notas de voz...
        </div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>

      <div id="results" style="display:none">
        <div class="ai-answer" style="margin-bottom:20px">
          <div class="ai-answer-label">Respuesta IA</div>
          <div class="ai-answer-text" id="answer-text"></div>
        </div>
        <div class="section-title" style="margin-bottom:14px">Fuentes</div>
        <div id="sources"></div>
      </div>
    </div>
  </div>
</div>

<nav class="mobile-tabs"><div class="mobile-tabs-inner" id="mobile-tabs"></div></nav>
<script src="/app/js/shared.js"></script>
<script>
function init() { renderSidebar('search'); renderMobileTabs('search'); }
function doSearch() {
  document.getElementById('examples').style.display='none';
  document.getElementById('results').style.display='none';
  document.getElementById('loading').style.display='block';
  setTimeout(() => {
    document.getElementById('loading').style.display='none';
    document.getElementById('results').style.display='block';
    document.getElementById('answer-text').textContent='Según tu nota de voz del 15 de marzo, el cemento subió 15%. Jean Pierre confirmó que actualizará la cotización para el viernes. También mencionaste negociar precios por volumen con los proveedores.';
    document.getElementById('sources').innerHTML=`
      <div class="card" style="margin-bottom:10px;cursor:pointer">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span class="voice-badge">🎙 0:47</span>
          <span style="font-size:12px;color:var(--text-muted)">Mar 15, 11:45 AM · WhatsApp</span>
        </div>
        <div style="font-size:13px;color:var(--text-secondary)">Hay que revisar los precios antes del lunes. El cemento subió 15 por ciento...</div>
      </div>
      <div class="card" style="margin-bottom:10px;cursor:pointer">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span class="voice-badge">🎙 1:32</span>
          <span style="font-size:12px;color:var(--text-muted)">Mar 15, 10:20 AM · Telegram</span>
        </div>
        <div style="font-size:13px;color:var(--text-secondary)">Bonjour, je voulais confirmer que les travaux commenceront bien lundi prochain...</div>
      </div>`;
  }, 1500);
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
