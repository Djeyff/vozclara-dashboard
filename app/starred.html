<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favoritos — VozClara</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/styles.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="page-content">
      <div class="page-header animate-in"><h1 class="page-title">Favoritos</h1></div>

      <div class="animate-in delay-1">
        <div class="card" style="margin-bottom:10px;cursor:pointer">
          <div style="display:flex;align-items:flex-start;gap:12px">
            <div style="font-size:14px;margin-top:2px">🇫🇷</div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
                <span class="voice-badge">🎙 1:32</span>
                <span class="pill pill-group">Clients</span>
                <span style="font-size:11px;color:var(--text-muted);margin-left:auto">Mar 15, 10:20 AM</span>
              </div>
              <div style="font-size:13px;color:var(--text-secondary)">Bonjour, je voulais confirmer que les travaux commenceront bien lundi prochain...</div>
            </div>
            <span style="color:#f39c12;font-size:16px">★</span>
          </div>
        </div>

        <div class="card" style="margin-bottom:10px;cursor:pointer">
          <div style="display:flex;align-items:flex-start;gap:12px">
            <div style="font-size:14px;margin-top:2px">🇪🇸</div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
                <span class="voice-badge">🎙 0:38</span>
                <span style="font-size:11px;color:var(--text-muted);margin-left:auto">Mar 14, 9:00 AM</span>
              </div>
              <div style="font-size:13px;color:var(--text-secondary)">Buenos días. Confirmado el pedido de materiales. Llega mañana a las 8...</div>
            </div>
            <span style="color:#f39c12;font-size:16px">★</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<nav class="mobile-tabs"><div class="mobile-tabs-inner" id="mobile-tabs"></div></nav>
<script src="/app/js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => { renderSidebar('starred'); renderMobileTabs('starred'); });
</script>
</body>
</html>
