<!DOCTYPE html>
<html lang="en" class="bg-gray-950">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VozClara — Login</title>
  <link rel="icon" href="/public/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
  <style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-[#6366f1] to-[#818cf8] flex items-center justify-center mx-auto mb-4">
        <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2a4 4 0 00-4 4v5a4 4 0 008 0V6a4 4 0 00-4-4zm6 9v2a6 6 0 01-12 0v-2H4v2a8 8 0 007 7.9V23h2v-2.1A8 8 0 0020 13v-2h-2z"/></svg>
      </div>
      <h1 class="text-2xl font-bold">VozClara</h1>
      <p class="text-sm text-gray-400 mt-1">Your voice, clarified</p>
    </div>
    <div class="bg-gray-900 rounded-xl p-6 border border-gray-800">
      <div id="step-phone">
        <label class="text-xs text-gray-400 block mb-2">Phone number (with country code)</label>
        <input type="tel" id="phone" placeholder="+1 234 567 8900" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#6366f1] mb-4" autofocus>
        <button onclick="requestOTP()" id="btn-otp" class="w-full bg-[#6366f1] hover:bg-[#6366f1]/80 text-white py-3 rounded-lg text-sm font-medium transition-colors">Send OTP via WhatsApp</button>
      </div>
      <div id="step-otp" class="hidden">
        <label class="text-xs text-gray-400 block mb-2">Enter the 6-digit code</label>
        <input type="text" id="otp" placeholder="123456" maxlength="6" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white text-center text-2xl tracking-widest placeholder-gray-500 focus:outline-none focus:border-[#6366f1] mb-4 font-mono">
        <button onclick="verifyOTP()" id="btn-verify" class="w-full bg-[#6366f1] hover:bg-[#6366f1]/80 text-white py-3 rounded-lg text-sm font-medium transition-colors">Verify</button>
        <button onclick="reset()" class="w-full text-xs text-gray-500 hover:text-white mt-3 transition-colors">Use a different number</button>
      </div>
      <p id="error" class="text-red-400 text-xs mt-3 hidden"></p>
    </div>
    <p class="text-xs text-gray-600 text-center mt-4">By signing in, you agree to our <a href="https://voz-clara.com/terms-of-service" class="text-gray-400 hover:text-white">Terms</a> and <a href="https://voz-clara.com/privacy-policy" class="text-gray-400 hover:text-white">Privacy Policy</a></p>
  </div>
  <script>
    const err = document.getElementById('error');
    async function requestOTP() {
      const phone = document.getElementById('phone').value.trim().replace(/\D/g, '');
      if (!phone || phone.length < 8) { showErr('Enter a valid phone number'); return; }
      const btn = document.getElementById('btn-otp');
      btn.textContent = 'Sending...'; btn.disabled = true; err.classList.add('hidden');
      try {
        const r = await fetch('/api/request-otp', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone }) });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Failed');
        document.getElementById('step-phone').classList.add('hidden');
        document.getElementById('step-otp').classList.remove('hidden');
        document.getElementById('otp').focus();
      } catch(e) { showErr(e.message); btn.textContent = 'Send OTP via WhatsApp'; btn.disabled = false; }
    }
    async function verifyOTP() {
      const phone = document.getElementById('phone').value.trim().replace(/\D/g, '');
      const otp = document.getElementById('otp').value.trim();
      if (!otp || otp.length < 6) { showErr('Enter the 6-digit code'); return; }
      const btn = document.getElementById('btn-verify');
      btn.textContent = 'Verifying...'; btn.disabled = true; err.classList.add('hidden');
      try {
        const r = await fetch('/api/verify-otp', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone, otp }) });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Failed');
        window.location.href = '/app/';
      } catch(e) { showErr(e.message); btn.textContent = 'Verify'; btn.disabled = false; }
    }
    function reset() {
      document.getElementById('step-phone').classList.remove('hidden');
      document.getElementById('step-otp').classList.add('hidden');
      document.getElementById('btn-otp').textContent = 'Send OTP via WhatsApp';
      document.getElementById('btn-otp').disabled = false;
    }
    function showErr(msg) { err.textContent = msg; err.classList.remove('hidden'); }
    document.getElementById('phone')?.addEventListener('keydown', e => { if (e.key === 'Enter') requestOTP(); });
    document.getElementById('otp')?.addEventListener('keydown', e => { if (e.key === 'Enter') verifyOTP(); });
  </script>
</body>
</html>
