<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Transcripciones — VozClara</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/styles.css">
<style>
  .source-icon { width: 18px; height: 18px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; }
  .source-wa { background: rgba(37,211,102,0.15); color: #25d366; }
  .source-tg { background: rgba(0,136,204,0.15); color: #0088cc; }
  .source-ch { background: rgba(66,133,244,0.15); color: #4285f4; }
  .star-btn { color: var(--text-muted); cursor: pointer; font-size: 16px; transition: color 0.15s; }
  .star-btn.starred { color: #f39c12; }
  .star-btn:hover { color: #f39c12; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="two-panel">

    <!-- CENTER: Transcript list -->
    <div class="panel-list" style="width:340px">
      <div class="panel-list-header">
        <h2>Transcripciones</h2>
        <div class="filter-bar" style="margin-top:10px">
          <button class="filter-pill active" onclick="filterSrc(this,'all')">Todos</button>
          <button class="filter-pill" onclick="filterSrc(this,'wa')"><span class="source-icon source-wa">W</span> WhatsApp</button>
          <button class="filter-pill" onclick="filterSrc(this,'tg')"><span class="source-icon source-tg">T</span> Telegram</button>
        </div>
      </div>
      <div class="panel-list-scroll" id="transcript-list"></div>
    </div>

    <!-- RIGHT: Transcript detail -->
    <div class="panel-detail" id="transcript-detail">
      <div class="panel-detail-empty" id="detail-empty">
        <div class="empty-icon">🎙️</div>
        <p>Selecciona una transcripción</p>
      </div>
      <div id="detail-content" style="display:none">
        <div class="action-bar" id="detail-actions"></div>
        <div class="detail-header" id="detail-header"></div>
        <div class="detail-body" id="detail-body"></div>
      </div>
    </div>

  </div>
</div>

<div id="mobile-detail-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:72px;background:var(--bg-page);z-index:40;overflow-y:auto">
  <button class="back-btn" style="display:flex" onclick="document.getElementById('mobile-detail-overlay').style.display='none'">← Volver</button>
  <div id="mobile-detail-content"></div>
</div>

<nav class="mobile-tabs"><div class="mobile-tabs-inner" id="mobile-tabs"></div></nav>

<script src="/app/js/shared.js"></script>
<script>
const TRANSCRIPTS = [
  { id: '1', source: 'wa', lang: 'es', flag: '🇪🇸', date: 'Mar 15, 11:45 AM', duration: 47, starred: false, folder: null,
    preview: 'Hay que revisar los precios antes del lunes. El cemento subió 15 por ciento...',
    transcript: 'Hay que revisar los precios antes del lunes. El cemento subió 15 por ciento. Necesitamos actualizar todas las cotizaciones y hablar con los proveedores para ver si podemos negociar un mejor precio por volumen. También necesitamos confirmar con Roberto los azulejos para el jueves.',
    summary: 'Cement prices increased 15%. All quotes need updating. Negotiate bulk pricing with suppliers. Confirm tile delivery for Thursday with Roberto.',
    actions: ['Budget: update before Friday', 'Call suppliers re: bulk pricing'] },
  { id: '2', source: 'tg', lang: 'fr', flag: '🇫🇷', date: 'Mar 15, 10:20 AM', duration: 92, starred: true, folder: 'Clients',
    preview: 'Bonjour, je voulais confirmer que les travaux commenceront bien lundi prochain...',
    transcript: 'Bonjour, je voulais confirmer que les travaux commenceront bien lundi prochain. J\'ai parlé avec l\'architecte et il m\'a dit que les plans sont prêts. Par contre, il faudrait prévoir un budget supplémentaire pour les finitions du salon. Il parle d\'environ 15 mille dollars de plus.',
    summary: 'Work starts Monday. Architect says plans are ready. Additional $15,000 budget needed for living room finishes.',
    actions: ['Prepare additional budget estimate', 'Confirm Monday start with team'] },
  { id: '3', source: 'wa', lang: 'en', flag: '🇬🇧', date: 'Mar 14, 4:15 PM', duration: 25, starred: false, folder: null,
    preview: 'Hey Jeffrey, just wanted to let you know the hockey finals are set for this Saturday...',
    transcript: 'Hey Jeffrey, just wanted to let you know the hockey finals are set for this Saturday. Canada vs USA. We\'re opening at 7 PM if you want to make a poster for the event.',
    summary: 'Hockey finals Saturday. Canada vs USA at Sporting Club. Event at 7 PM. Poster requested.',
    actions: ['Create event poster'] },
  { id: '4', source: 'wa', lang: 'es', flag: '🇪🇸', date: 'Mar 14, 2:30 PM', duration: 63, starred: false, folder: 'Legal',
    preview: 'El abogado dijo que necesitamos una carta notarizada para completar el trámite...',
    transcript: 'El abogado dijo que necesitamos una carta notarizada para completar el trámite del financiamiento. También hay que revisar una cláusula nueva en el contrato. Aparentemente el banco cambió las condiciones la semana pasada sin notificarnos.',
    summary: 'Notarized letter needed for financing. New contract clause added by bank without notice. Review changes with lawyer.',
    actions: ['Get notarized letter', 'Review new contract clause with lawyer'] },
  { id: '5', source: 'tg', lang: 'es', flag: '🇪🇸', date: 'Mar 14, 9:00 AM', duration: 38, starred: true, folder: null,
    preview: 'Buenos días. Confirmado el pedido de materiales. Llega mañana a las 8...',
    transcript: 'Buenos días. Confirmado el pedido de materiales. Llega mañana a las 8 de la mañana. Son 50 bolsas de cemento, 20 metros de tubería PVC y las herramientas que pedimos la semana pasada.',
    summary: 'Materials order confirmed for delivery tomorrow 8 AM: 50 bags cement, 20m PVC pipe, tools.',
    actions: ['Prepare receiving area for delivery'] },
];

function init() {
  renderSidebar('inbox');
  renderMobileTabs('inbox');
  renderList();
}

function renderList() {
  document.getElementById('transcript-list').innerHTML = TRANSCRIPTS.map(t => `
    <div class="list-item" onclick="selectTranscript('${t.id}')" id="ti-${t.id}">
      <div class="source-icon ${t.source === 'wa' ? 'source-wa' : t.source === 'tg' ? 'source-tg' : 'source-ch'}" style="margin-top:3px">
        ${t.source === 'wa' ? 'W' : t.source === 'tg' ? 'T' : 'C'}
      </div>
      <div class="list-item-content">
        <div class="list-item-title">
          <span>${t.flag}</span>
          <span class="voice-badge">🎙 ${formatDuration(t.duration)}</span>
          ${t.folder ? `<span class="pill pill-group">${t.folder}</span>` : ''}
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:3px">${t.date}</div>
        <div class="list-item-preview">${t.preview}</div>
      </div>
      <div style="flex-shrink:0">
        <span class="star-btn ${t.starred ? 'starred' : ''}" onclick="event.stopPropagation()">★</span>
      </div>
    </div>
  `).join('');
}

function selectTranscript(id) {
  const t = TRANSCRIPTS.find(x => x.id === id);
  if (!t) return;
  document.querySelectorAll('.list-item').forEach(el => el.classList.remove('selected'));
  document.getElementById('ti-' + id)?.classList.add('selected');
  document.getElementById('detail-empty').style.display = 'none';
  document.getElementById('detail-content').style.display = 'block';

  document.getElementById('detail-actions').innerHTML = `
    <button class="action-btn" onclick="navigator.clipboard.writeText(document.getElementById('full-text').textContent)">📋 Copiar</button>
    <button class="action-btn">⬇️ .txt</button>
    <button class="action-btn" style="opacity:0.5" title="Pro plan">📄 PDF 🔒</button>
    <button class="action-btn">📁 Mover</button>
    <button class="action-btn danger" style="margin-left:auto">🗑</button>
  `;

  document.getElementById('detail-header').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span class="source-icon ${t.source === 'wa' ? 'source-wa' : 'source-tg'}">${t.source === 'wa' ? 'W' : 'T'}</span>
      <span style="font-size:12px;color:var(--text-muted)">${t.source === 'wa' ? 'WhatsApp' : 'Telegram'}</span>
      <span>${t.flag}</span>
      <span class="voice-badge">🎙 ${formatDuration(t.duration)}</span>
    </div>
    <h3>${t.date}</h3>
    <div class="meta">
      <span>${Math.round(t.transcript.split(' ').length)} words</span>
      <span>·</span>
      <span>Standard AI</span>
    </div>
  `;

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-section">
      <div class="detail-section-title">Transcripción</div>
      <div class="transcript-expand">
        <div class="transcript-text" id="full-text">${t.transcript}</div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">AI Summary</div>
      <div class="ai-answer">
        <div class="ai-answer-text">${t.summary}</div>
        ${t.actions.length ? `<div style="margin-top:12px">
          <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;font-weight:600;margin-bottom:6px">Action Items</div>
          ${t.actions.map(a => `<div class="briefing-item"><div class="briefing-dot orange"></div>${a}</div>`).join('')}
        </div>` : ''}
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">🌐 Traducir</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${['English','Español','Français','Português','Deutsch'].map(l => `<button class="filter-pill" style="font-size:11px">${l}</button>`).join('')}
      </div>
    </div>
  `;

  if (window.innerWidth <= 768) {
    const overlay = document.getElementById('mobile-detail-overlay');
    document.getElementById('mobile-detail-content').innerHTML = document.getElementById('detail-content').innerHTML;
    overlay.style.display = 'block';
  }
}

function filterSrc(el, src) {
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
