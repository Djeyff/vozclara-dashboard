<!DOCTYPE html>
<html lang="en" class="bg-gray-950">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VozClara — Settings</title>
  <link rel="icon" href="/public/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
  <style>body{font-family:'Inter',sans-serif}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#030712}::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}</style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex">
  <aside id="sidebar" class="hidden md:flex md:flex-col w-56 bg-gray-900 border-r border-gray-700 h-screen sticky top-0 shrink-0"></aside>

  <main class="flex-1 min-w-0 pb-16 md:pb-0">
    <header class="sticky top-0 z-10 bg-gray-950/80 backdrop-blur border-b border-gray-800 px-4 sm:px-6 py-3">
      <h1 class="text-lg font-semibold">Settings</h1>
    </header>

    <div class="border-b border-gray-800 px-4 sm:px-6 overflow-x-auto">
      <div class="flex gap-0 min-w-max" id="tabs"></div>
    </div>

    <div class="px-4 sm:px-6 py-4 max-w-2xl" id="tab-content">
      <div class="h-32 bg-gray-800 rounded-xl animate-pulse"></div>
    </div>
  </main>

  <nav id="mobile-tabs" class="md:hidden fixed bottom-0 inset-x-0 bg-gray-900 border-t border-gray-700 grid grid-cols-4 h-14 z-20"></nav>

  <script src="/app/js/shared.js"></script>
  <script>
    renderSidebar('settings');
    renderMobileTabs('settings');

    const TABS = [
      { id: 'profile', label: 'Profile' },
      { id: 'language', label: 'Language' },
      { id: 'transcription', label: 'Transcription' },
      { id: 'billing', label: 'Billing' },
      { id: 'api', label: 'API Keys' },
      { id: 'privacy', label: 'Data & Privacy' },
      { id: 'referral', label: 'Referral' },
    ];

    let activeTab = 'profile';
    let userSettings = null;
    let usageData = null;

    function renderTabs() {
      $('#tabs').innerHTML = TABS.map(t =>
        `<button onclick="switchTab('${t.id}')" class="px-4 py-3 text-sm font-medium whitespace-nowrap border-b-2 transition-colors ${t.id === activeTab ? 'text-white border-[#6366f1]' : 'text-gray-400 border-transparent hover:text-white'}">${t.label}</button>`
      ).join('');
    }

    async function switchTab(id) {
      activeTab = id;
      renderTabs();
      const el = $('#tab-content');
      el.innerHTML = '<div class="h-32 bg-gray-800 rounded-xl animate-pulse"></div>';

      try {
        if (!userSettings) userSettings = await api('/api/vc/settings');
        if (!usageData) usageData = await api('/api/vc/usage');

        switch(id) {
          case 'profile': renderProfile(); break;
          case 'language': renderLanguage(); break;
          case 'transcription': renderTranscription(); break;
          case 'billing': renderBilling(); break;
          case 'api': renderAPI(); break;
          case 'privacy': renderPrivacy(); break;
          case 'referral': renderReferral(); break;
        }
      } catch(e) { showError('#tab-content', e.message); }
    }

    function renderProfile() {
      const u = userSettings || {};
      $('#tab-content').innerHTML = `<div class="space-y-4">
        <div class="bg-gray-900 rounded-xl p-4 border border-gray-800 flex items-center gap-4">
          <div class="w-16 h-16 rounded-full bg-gradient-to-br from-[#6366f1] to-[#818cf8] flex items-center justify-center text-2xl font-bold">${(u.name || u.email || 'U')[0].toUpperCase()}</div>
          <div><p class="font-medium">${esc(u.name || 'User')}</p><p class="text-sm text-gray-400">${esc(u.email || '')}</p><p class="text-xs text-gray-500 mt-0.5">${(u.tier || 'free').toUpperCase()} plan · Joined ${formatDate(u.created_at)}</p></div>
        </div>
        <div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
          <label class="text-xs text-gray-400 block mb-1">Display Name</label>
          <input type="text" value="${esc(u.name || '')}" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-[#6366f1]" readonly>
        </div>
        <div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
          <label class="text-xs text-gray-400 block mb-1">Phone</label>
          <div class="flex items-center gap-2">
            <input type="text" value="${esc(u.phone || '')}" class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white" readonly>
            <span class="${u.phone_verified ? 'text-emerald-400' : 'text-amber-400'} text-xs">${u.phone_verified ? '✓ Verified' : 'Not verified'}</span>
          </div>
        </div>
      </div>`;
    }

    function renderLanguage() {
      $('#tab-content').innerHTML = `<div class="space-y-4">
        <div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
          <h3 class="text-sm font-medium mb-2">Output Language</h3>
          <p class="text-xs text-gray-400 mb-3">Language for summaries and AI responses</p>
          <select class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-[#6366f1]">
            <option value="auto">Auto-detect</option>
            <option value="es">Spanish</option>
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="pt">Portuguese</option>
            <option value="de">German</option>
          </select>
        </div>
        <div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
          <h3 class="text-sm font-medium mb-2">Speech Detection</h3>
          <p class="text-xs text-gray-400">Automatic — detects 99+ languages from speech content</p>
        </div>
      </div>`;
    }

    function renderTranscription() {
      $('#tab-content').innerHTML = `<div class="space-y-4">
        <div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
          <h3 class="text-sm font-medium mb-2">Transcription Quality</h3>
          <p class="text-xs text-gray-400 mb-3">Higher quality = slightly slower but more accurate</p>
          <select class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-[#6366f1]">
            <option>Standard (faster)</option>
            <option selected>Enhanced (recommended)</option>
          </select>
        </div>
        <div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
          <h3 class="text-sm font-medium mb-2">Auto-Summary</h3>
          <p class="text-xs text-gray-400 mb-3">Automatically generate key points for each voice note</p>
          <div class="flex items-center gap-2">
            <div class="w-10 h-5 bg-[#6366f1] rounded-full relative cursor-pointer"><div class="w-4 h-4 bg-white rounded-full absolute top-0.5 right-0.5"></div></div>
            <span class="text-sm text-gray-300">Enabled</span>
          </div>
        </div>
      </div>`;
    }

    function renderBilling() {
      const u = usageData || {};
      const tier = (u.tier || 'free').toUpperCase();
      const l = u.limits || {};
      const t = u.today || {};
      const a = u.all_time || {};
      $('#tab-content').innerHTML = `<div class="space-y-4">
        <div class="bg-gray-900 rounded-xl p-6 border border-gray-800">
          <div class="flex items-center justify-between mb-4">
            <div><p class="text-xs text-gray-500">CURRENT PLAN</p><p class="text-2xl font-bold">${tier}</p></div>
            <button onclick="window.open('https://voz-clara.com/#pricing','_blank')" class="bg-[#6366f1] hover:bg-[#6366f1]/80 text-white text-sm px-4 py-2 rounded-lg transition-colors">Upgrade</button>
          </div>
        </div>
        <div class="bg-gray-900 rounded-xl p-6 border border-gray-800 space-y-4">
          <h3 class="text-sm font-medium">Usage</h3>
          ${usageMeter('Notes today', t.notes_count || 0, l.notes_per_day || 5)}
          ${usageMeter('Minutes/month', Math.round(a.minutes || 0), l.minutes_per_month || 30)}
          ${usageMeter('AI Searches', a.searches || 0, l.searches_per_month || 10)}
        </div>
      </div>`;
    }

    function renderAPI() {
      $('#tab-content').innerHTML = `<div class="bg-gray-900 rounded-xl p-6 border border-gray-800 text-center">
        <span class="text-3xl block mb-3">🔑</span>
        <p class="font-medium">API Keys — Business Plan</p>
        <p class="text-sm text-gray-400 mt-2">Programmatic access to your transcripts and AI search. Available on Business plan.</p>
        <button onclick="window.open('https://voz-clara.com/#pricing','_blank')" class="mt-4 bg-[#6366f1] hover:bg-[#6366f1]/80 text-white text-sm px-4 py-2 rounded-lg transition-colors">Upgrade to Business</button>
      </div>`;
    }

    function renderPrivacy() {
      $('#tab-content').innerHTML = `<div class="space-y-4">
        <div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
          <h3 class="text-sm font-medium mb-2">Export Your Data</h3>
          <p class="text-xs text-gray-400 mb-3">Download all your transcripts and account data</p>
          <button class="bg-gray-800 hover:bg-gray-700 text-gray-300 text-sm px-4 py-2 rounded-lg transition-colors">Request Export</button>
        </div>
        <div class="bg-gray-900 rounded-xl p-4 border border-red-500/30">
          <h3 class="text-sm font-medium text-red-400 mb-2">Delete Account</h3>
          <p class="text-xs text-gray-400 mb-3">Permanently delete your account and all associated data.</p>
          <button class="bg-red-500/20 text-red-400 hover:bg-red-500/30 text-sm px-4 py-2 rounded-lg transition-colors">Delete Account</button>
        </div>
      </div>`;
    }

    function renderReferral() {
      $('#tab-content').innerHTML = `<div class="bg-gradient-to-br from-[#6366f1]/20 to-gray-900 rounded-xl p-6 border border-[#6366f1]/30 text-center">
        <span class="text-4xl block mb-3">🎁</span>
        <h2 class="text-xl font-bold mb-2">Refer a Friend</h2>
        <p class="text-sm text-gray-300 mb-4">Share VozClara and earn free minutes when friends sign up.</p>
        <div class="bg-gray-800/50 rounded-xl p-4 mb-4 max-w-sm mx-auto">
          <p class="text-xs text-gray-500 mb-1">YOUR REFERRAL LINK</p>
          <div class="flex items-center gap-2">
            <input type="text" value="https://voz-clara.com/r/coming-soon" class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white" readonly>
            <button onclick="navigator.clipboard.writeText('https://voz-clara.com/r/coming-soon')" class="bg-[#6366f1] hover:bg-[#6366f1]/80 text-white text-xs px-3 py-2 rounded-lg transition-colors">Copy</button>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-3 max-w-sm mx-auto text-center">
          <div><p class="text-xl font-bold">0</p><p class="text-xs text-gray-400">Referrals</p></div>
          <div><p class="text-xl font-bold">0</p><p class="text-xs text-gray-400">Signed Up</p></div>
          <div><p class="text-xl font-bold">0 min</p><p class="text-xs text-gray-400">Earned</p></div>
        </div>
      </div>`;
    }

    renderTabs();
    switchTab('profile');
  </script>
</body>
</html>
